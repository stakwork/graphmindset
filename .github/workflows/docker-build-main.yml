name: Docker Build and Push to DockerHub (main)
env:
  DOCKER_CLI_EXPERIMENTAL: enabled

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and push graphmindset image
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
    steps:
      - name: Check out from Git
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        run: |
          docker build --no-cache -t "${{ secrets.DOCKER_HUB_USER }}/graphmindset:main" .
          docker push "${{ secrets.DOCKER_HUB_USER }}/graphmindset:main"
